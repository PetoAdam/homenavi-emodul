services:
  emodul:
    image: ghcr.io/petoadam/homenavi-emodul:${HN_VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - PORT=8099
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - INTEGRATION_SETUP_PATH=/app/config/integration.setup.json
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://mosquitto:1883}
    volumes:
      - ${INTEGRATIONS_ROOT:?set INTEGRATIONS_ROOT}/integrations/setup/emodul.setup.json:/app/config/integration.setup.json
      - ${INTEGRATIONS_ROOT:?set INTEGRATIONS_ROOT}/keys/jwt_public.pem:/app/keys/jwt_public.pem:ro
    networks:
      - homenavi-network

networks:
  homenavi-network:
    external: true
    name: homenavi-network
